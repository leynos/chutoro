# .config/nextest.toml
[profile.default]
# Limit how many test binaries Nextest runs concurrently. When individual tests
# spawn internal thread pools (e.g., Rayon), tune this with RAYON_NUM_THREADS
# to avoid oversubscription.
test-threads = 8
# Kill any test once it crosses 60s.
slow-timeout = { period = "60s", terminate-after = 1, grace-period = "5s" }

# Put a hard ceiling on the whole run.
global-timeout = "40m"

[[profile.default.overrides]]
# Criterion benchmarks run as test targets and need more than the default 60s
# timeout.  The HNSW n=5000 and diverse-source cases plus extraction
# benchmarks routinely exceed 60s under parallel load and can occasionally
# exceed 600s on shared runners.
filter = "package(chutoro-benches) & kind(bench)"
threads-required = 8
slow-timeout = { period = "900s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# The largest extraction benchmark can exceed the generic 300s bench timeout on
# slower or more contended developer machines.
filter = "package(chutoro-benches) & test(/extract_labels\\//)"
threads-required = 8
slow-timeout = { period = "600s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Some Criterion groups hang under nextest when multiple report-writing bench
# processes overlap on smaller machines, even though the binaries finish
# immediately when invoked directly.
filter = "package(chutoro-benches) & test(/edge_harvest_construction\\//)"
threads-required = 8
slow-timeout = { period = "600s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Edge harvest property suite can run slower under heavy parallel load.
filter = "test(/edge_harvest_suite::/)"
slow-timeout = { period = "180s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Idempotency proptest can exceed the default timeout under parallel load.
filter = "test(/hnsw_idempotency_preserved_proptest/)"
slow-timeout = { period = "600s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Edge harvest validity case_4 can exceed the default timeout under heavy
# instrumentation/load despite tiny input sizes.
filter = "test(/build_with_edges_returns_valid_edges::case_4/)"
slow-timeout = { period = "180s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Edge harvest sort-order test can exceed the default timeout under coverage
# instrumentation due to the cost of a parallel HNSW build.
filter = "test(/build_with_edges_edges_sorted_by_sequence/)"
slow-timeout = { period = "180s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Idempotency rstest case_4 can exceed 60s under llvm-cov instrumentation
# despite a tiny 16-vector fixture, matching the edge harvest case_4 precedent.
filter = "test(/idempotency_rstest_cases::case_4/)"
slow-timeout = { period = "180s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Mutation proptest can exceed the default timeout under parallel load.
filter = "test(/hnsw_mutations_preserve_invariants_proptest/)"
slow-timeout = { period = "180s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Search-vs-brute-force proptest can exceed the default timeout under CI load.
filter = "test(/hnsw_search_matches_brute_force_proptest/)"
slow-timeout = { period = "180s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Write-lock proptest can exceed the default timeout under parallel load.
filter = "test(/generated_hnsw_scoring_does_not_run_inside_write_graph_scope/)"
slow-timeout = { period = "600s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# The ARI/NMI baseline cases occasionally stall under heavy coverage load.
# Run these cases in isolation and fail fast so they cannot monopolize CI.
filter = "test(/hnsw_pipeline_matches_exact_baseline::case_/)"
threads-required = 4
slow-timeout = { period = "180s", terminate-after = 1, grace-period = "5s" }
retries = 1

[[profile.default.overrides]]
# Trybuild compile checks build fixture crates in isolated target directories
# and can exceed the generic 60s timeout on shared developer machines.
filter = "test(/portable_simd_gating_compile_checks|session_api_compiles_when_cpu_feature_is_enabled|dataset_recipe_phase_order/)"
threads-required = 4
slow-timeout = { period = "300s", terminate-after = 1, grace-period = "5s" }

[[profile.default.overrides]]
# Benchmark smoke integration coverage runs nested cargo bench commands and
# should not overlap with other expensive benchmark targets.
filter = "test(/benchmark_binaries_cover_discovery_and_exact_smoke_paths/)"
threads-required = 8
slow-timeout = { period = "300s", terminate-after = 1, grace-period = "5s" }


[[profile.default.overrides]]
# Trybuild tests compile fixture crates with a nested cargo invocation; under
# a cold coverage target directory the dependency rebuild can exceed the
# generic 60s timeout.
filter = "test(/dataset_recipe_phase_order/)"
slow-timeout = { period = "300s", terminate-after = 1, grace-period = "5s" }

