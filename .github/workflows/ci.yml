name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
      # Pin Rayon to a single worker so the HNSW build is deterministic during
      # coverage. `CpuHnsw::build` inserts nodes through `into_par_iter` and
      # `sample_level` draws from a per-worker RNG chosen by
      # `current_thread_index`, so multi-threaded scheduling varies both the
      # insertion order and the random draws, producing a different graph — and
      # therefore different covered lines — on each run. That made whole-workspace
      # coverage wobble run-to-run and false-tripped the ratchet. One worker keeps
      # the ratchet input reproducible and matched to the coverage-main baseline.
      RAYON_NUM_THREADS: '1'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          # cs-coverage check diffs the PR against its merge base, so the
          # full history must be fetched for the merge base to be reachable.
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
      - name: Dense stable SIMD gating
        run: |
          cargo clippy -p chutoro-providers-dense \
            --all-targets \
            --no-default-features \
            --features simd_avx2,simd_avx512,simd_neon \
            -- -D warnings
          cargo test -p chutoro-providers-dense \
            --no-default-features \
            --features simd_avx2,simd_avx512,simd_neon
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Cache Whitaker installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.14'
          enable-cache: true
      - name: Spelling
        run: make spelling
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: lcov.info
          format: lcov
          # chutoro#155: one test passes under nextest's process isolation
          # but fails under plain cargo test, so coverage stays on nextest.
          use-cargo-nextest: 'true'
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@9f788dad94c848e3bbddfb90f9e80b6742b7390c
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/71838
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

  verus-proofs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Install Verus
        run: scripts/install-verus.sh
        env:
          VERUS_INSTALL_DIR: ${{ runner.temp }}/verus
      - name: Run Verus proofs
        run: make verus
        env:
          VERUS_BIN: ${{ runner.temp }}/verus/verus/verus
